<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediSafe Sign Up</title>
  <link rel="stylesheet" href="signup_page.css">
</head>
<body>
  <div class="container">
    <!-- LEFT SIDE -->
    <div class="left-side">
      <img src="assets/image.jpg" alt="MediSafe Logo" class="logo">
      <h1 class="left-title">Create Account</h1>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-side">
      
      <!-- Verification modal -->
      <div id="verification-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 10px; text-align: center; width: 350px; position: relative;">
          <button id="close-modal" style="position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 20px; cursor: pointer;">&times;</button>
          <h2>Verify Your Email</h2>
          <p>Enter the 6-digit code sent to <strong id="verification-email"></strong></p>
          <input type="text" id="verification-code" placeholder="000000" maxlength="6" style="font-size: 24px; letter-spacing: 5px; text-align: center; width: 100%; padding: 10px; margin: 15px 0; border: 2px solid #ddd; border-radius: 5px;">
          <button id="verify-btn" style="width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">Verify</button>
          <p style="margin-top: 15px; font-size: 12px; color: #999;">Didn't receive the code? <button type="button" id="resend-btn" style="background: none; border: none; color: #3A86FF; cursor: pointer; text-decoration: underline;">Resend</button></p>
        </div>
      </div>

      <div class="signup-card">
        <h2 class="signup-title">Sign Up</h2>
        <form id="signup-form">
          <input type="text" placeholder="First Name" name="firstName" required>
          <input type="text" placeholder="Last Name" name="lastName" required>
          <input type="email" placeholder="Email" name="email" id="email" required>

          <div class="password-field">
            <input type="password" placeholder="Password" name="password" id="password" required>
            <button type="button" id="password-toggle" class="toggle-password" aria-label="Show password" data-showing="false">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
              </svg>
            </button>
          </div>


          <div class="password-field">
            <input type="password" placeholder="Confirm Password" name="confirmPassword" id="confirmPassword" required>
            <button type="button" id="confirm-toggle" class="toggle-password" aria-label="Show password" data-showing="false">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
              </svg>
            </button>
          </div>


          <input type="tel" placeholder="Contact Number" name="contact" required>

          <!-- Aligned checkbox with links -->
          <label class="agree-label">
            <input type="checkbox" id="agree" required>
            <div class="agree-label-text">
              I agree to the 
              <a href="terms.html" target="_blank">Terms & Conditions</a> 
              and 
              <a href="privacy.html" target="_blank">Privacy Policy</a>
            </div>
          </label>


          <button type="submit" class="signup-btn">Sign Up</button>
        </form>

        <p class="login-text">
          I have an account? <a href="login_page.html">Login</a>
        </p>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './assets/supabaseClient.js';

    let userEmail = '';
    let userData = {};

    const signupForm = document.getElementById('signup-form');
    const signupButton = document.querySelector('.signup-btn');
    const verificationModal = document.getElementById('verification-modal');
    const verificationEmail = document.getElementById('verification-email');
    const verificationCodeInput = document.getElementById('verification-code');
    const verifyBtn = document.getElementById('verify-btn');
    const resendBtn = document.getElementById('resend-btn');
    const closeModalBtn = document.getElementById('close-modal');

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const openEye = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>';
    const closedEye = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2.99902 3L20.999 21M9.8433 9.91364C9.32066 10.4536 8.99902 11.1892 8.99902 12C8.99902 13.6569 10.3422 15 12 15C12.8215 15 13.5667 14.669 14.1086 14.133M6.49902 6.64715C4.59972 7.90034 3.15305 9.78394 2.45703 12C3.73128 16.0571 7.52159 19 11.9992 19C13.9881 19 15.8414 18.4194 17.3988 17.4184M10.999 5.04939C11.328 5.01673 11.6617 5 11.9992 5C16.4769 5 20.2672 7.94291 21.5414 12C21.2607 12.894 20.8577 13.7338 20.3522 14.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    function setSignupLoading(isLoading) {
      if (!signupButton) return;
      signupButton.disabled = isLoading;
      signupButton.textContent = isLoading ? 'Signing Up…' : 'Sign Up';
    }

    function setVerifyLoading(isLoading) {
      if (!verifyBtn) return;
      verifyBtn.disabled = isLoading;
      verifyBtn.textContent = isLoading ? 'Verifying…' : 'Verify';
    }

    function showVerificationModal(email) {
      if (!verificationModal) return;
      verificationEmail.textContent = email;
      verificationCodeInput.value = '';
      verificationModal.style.display = 'flex';
      verificationModal.style.justifyContent = 'center';
      verificationModal.style.alignItems = 'center';
      if (signupForm) signupForm.style.display = 'none';
    }
    
    function hideVerificationModal() {
      if (!verificationModal) return;
      verificationModal.style.display = 'none';
      if (signupForm) signupForm.style.display = 'block';
    }

    // Toggle password visibility
    function togglePassword(id) {
      console.log('Toggle clicked for', id);
      const input = document.getElementById(id);
      const button = document.querySelector('#' + id + ' + .toggle-password');
      const isShowing = button.getAttribute('data-showing') === 'true';
      
      input.type = isShowing ? 'password' : 'text';
      button.innerHTML = isShowing ? openEye : closedEye;
      button.setAttribute('data-showing', !isShowing);
      button.setAttribute('aria-label', isShowing ? 'Show password' : 'Hide password');
    }


    function configurePasswordToggle(fieldId) {
      const input = document.getElementById(fieldId);
      const button = document.querySelector('#' + fieldId + ' + .toggle-password');
      if (!input || !button) return;

      // Set initial state
      button.innerHTML = openEye;
      button.setAttribute('data-showing', 'false');
      button.style.display = 'block';
      button.setAttribute('aria-label', 'Show password');

      // Add click listener
      button.addEventListener('click', () => togglePassword(fieldId));

      // Hide button if empty
      const updateVisibility = () => {
        button.style.display = input.value.trim() ? 'block' : 'none';
      };
      input.addEventListener('input', updateVisibility);
    }

    configurePasswordToggle('password');
    configurePasswordToggle('confirmPassword');


    // ================================
    // INSERT ROW INTO CUSTOM users TABLE
    // Called after OTP is verified successfully.
    // This is the missing step — Supabase Auth signup does NOT
    // automatically add a row to your custom users table.
    // ================================
    async function insertUserRow(email, firstName, lastName, contact) {
      try {
        // Check first if a row already exists for this email
        const { data: existing, error: existingError } = await supabase
          .from('users')
          .select('id, first_name, last_name, phone_number')
          .eq('email', email)
          .single();

        if (existing) {
          const needsUpdate =
            (firstName && !existing.first_name) ||
            (lastName && !existing.last_name) ||
            (contact && !existing.phone_number);

          if (needsUpdate) {
            const updates = {};
            if (firstName && !existing.first_name) updates.first_name = firstName;
            if (lastName && !existing.last_name) updates.last_name = lastName;
            if (contact && !existing.phone_number) updates.phone_number = contact;

            const { error: updateError } = await supabase
              .from('users')
              .update(updates)
              .eq('id', existing.id);

            if (updateError) {
              console.warn('⚠️ Failed to update existing user row:', updateError.message);
            } else {
              console.log('✅ Existing user row updated with missing profile fields:', existing.id);
            }
          }

          console.log('✅ User row already exists in users table:', existing.id);
          return existing.id;
        }
      } catch (_) {
        // .single() throws if no row found — that's fine, proceed to insert
      }

      // ✅ Insert new row into users table
      console.log('🔍 Attempting to insert new user row with data:', { email, firstName, lastName, contact });
      const { data, error } = await supabase
        .from('users')
        .insert([{
          email        : email,
          first_name   : firstName,
          last_name    : lastName,
          phone_number : contact,
          auth_provider: 'manual',
          is_verified  : true,
          profile_image: null
        }])
        .select('id')
        .single();

      if (error) {
        console.error('❌ Failed to insert user row:', error.message);
        console.error('❌ Full error details:', error);
        throw error;
      }

      console.log('✅ User row inserted into users table. id:', data.id);
      return data.id;
    }

    // Sign Up form submission using Supabase
    document.getElementById('signup-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const agree = document.getElementById('agree').checked;
      if (!agree) {
        alert('Please agree to the terms.');
        return;
      }

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const firstName = this.elements.firstName.value.trim();
      const lastName = this.elements.lastName.value.trim();
      const contact = this.elements.contact.value.trim();

      if (!email || !password || !firstName || !lastName || !contact) {
        alert('Please fill in all fields.');
        return;
      }

      if (!emailRegex.test(email)) {
        alert('Please enter a valid email address.');
        return;
      }

      if (password !== confirmPassword) {
        alert('Passwords do not match.');
        return;
      }

      setSignupLoading(true);
      userData = { firstName, lastName, contact };
      userEmail = email;

      try {
        const { data, error } = await supabase.auth.signUp({ 
          email, 
          password,
          options: {
            data: {
              first_name: firstName,
              last_name: lastName,
              contact_number: contact
            }
          }
        });

        console.log('SignUp response:', data, error);
        if (error) {
          throw error;
        }

        const alreadyConfirmed = data?.user?.email_confirmed_at;
        const userIsCreated = !!(data?.user);

        if (userIsCreated && alreadyConfirmed) {
          console.log('Email already confirmed, inserting user row and redirecting...');
          const newId = await insertUserRow(email, firstName, lastName, contact);
          if (newId) {
            localStorage.setItem('currentUserEmail', email);
            localStorage.setItem('currentUserId', String(newId));
          }
          alert('Account created! Logging you in...');
          window.location.href = 'dashboard_page.html';
        } else {
          console.log('Email not confirmed, showing OTP modal...');
          showVerificationModal(email);
        }
      } catch (err) {
        alert('Signup error: ' + (err.message || 'Please try again.'));
      } finally {
        setSignupLoading(false);
      }
    });

    // Verify OTP code
    document.getElementById('verify-btn').addEventListener('click', async function() {
      const code = verificationCodeInput.value.trim();

      if (!code || code.length !== 6) {
        alert('Please enter a valid 6-digit code.');
        return;
      }

      setVerifyLoading(true);
      try {
        const { data, error } = await supabase.auth.verifyOtp({
          email: userEmail,
          token: code,
          type : 'signup'
        });

        if (error) {
          throw error;
        }

        console.log('✅ OTP verified. Attempting to create profile row...');
        const newId = await insertUserRow(
          userEmail,
          userData.firstName,
          userData.lastName,
          userData.contact
        );

        if (!newId) {
          console.error('❌ insertUserRow returned null or empty');
          throw new Error('Unable to create profile row. Please check Supabase RLS policies on the users table.');
        }

        localStorage.setItem('currentUserEmail', userEmail);
        localStorage.setItem('currentUserId', String(newId));

        alert('Email verified! Logging you in...');
        window.location.href = 'dashboard_page.html';
      } catch (error) {
        console.error('❌ Verification catch error:', error);
        console.error('❌ Error code:', error.code || 'N/A');
        console.error('❌ Error hint:', error.hint || 'N/A');
        
        let userMessage = 'Verification error: ' + (error.message || 'Please try again.');
        if (error.code === 'PGRST301') {
          userMessage = '⚠️ Permission error: Your Supabase RLS policies are too restrictive. Please allow authenticated users to INSERT into the users table.';
        } else if (error.message && error.message.includes('permission')) {
          userMessage = '⚠️ Permission error detected. Check Supabase RLS policies on the users table.';
        }
        
        alert(userMessage);
      } finally {
        setVerifyLoading(false);
      }
    });

    document.getElementById('resend-btn').addEventListener('click', async function(e) {
      e.preventDefault();
      if (!userEmail) {
        alert('Unable to resend code. Please refresh and try again.');
        return;
      }

      try {
        const { error } = await supabase.auth.resend({ type: 'signup', email: userEmail });
        if (error) throw error;
        alert('Code resent to ' + userEmail);
      } catch (err) {
        alert('Resend error: ' + (err.message || 'Please try again.'));
      }
    });

    closeModalBtn.addEventListener('click', function() {
      hideVerificationModal();
    });
  </script>
</body>
</html>
