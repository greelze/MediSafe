<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediSafe - Monitoring Log</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="monitoring_log.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="logo-section">
                <div class="logo">🏥</div>
                <div class="brand-name">MediSafe</div>
            </div>
            <div class="nav-section">
                <a href="dashboard_page.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-text">Home</span></a>
                <a href="history_page.html"   class="nav-item"><span class="nav-icon">🕒</span><span class="nav-text">Threshold History</span></a>
                <a href="analytics_page.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">Analytics</span></a>
                <a href="sensors_location.html" class="nav-item"><span class="nav-icon">📍</span><span class="nav-text">Sensor Locations</span></a>
                <a href="audit_trail_local.html" class="nav-item"><span class="nav-icon">📋</span><span class="nav-text">Audit Trail</span></a>
                <a href="monitoring_log.html" class="nav-item active"><span class="nav-icon">🩺</span><span class="nav-text">Monitoring Log</span></a>
                <a href="settings_page.html"  class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-text">Settings</span></a>
            </div>
            <div class="profile-section">
                <a href="profile_page.html" class="profile-link"><div class="avatar-placeholder"></div></a>
                <a href="login_page.html" class="nav-item logout-item"><span class="nav-icon">🚪</span><span class="nav-text">Logout</span></a>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <span id="page-title">Monitoring Log 🩺</span>
            </div>

            <div class="monitoring-card">
                <div class="monitoring-header">
                    <h2 class="monitoring-title">Latest Status Logs</h2>
                    <span class="record-count" id="record-count">0 entries</span>
                </div>

                <div class="monitoring-table-wrapper">
                    <table class="monitoring-table">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Temperature</th>
                                <th>Humidity</th>
                                <th>UV Index</th>
                                <th>Notes</th>
                            </tr>
                        </thead>
                        <tbody id="monitoring-table-body"></tbody>
                    </table>
                </div>
                <div id="empty-state" class="empty-state" style="display:none;">
                    <div class="empty-icon">🩺</div>
                    <div class="empty-text">No status log records yet.</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="theme.js"></script>
    <script src="monitoring_log.js"></script>
</body>
</html>
