<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="login_page.css" />
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
  <div class="container">
    <div class="left-side">
      <h1 class="app-title">MediSafe</h1>
      <img src="assets/image.jpg" alt="MediSafe logo" class="logo" />
      <h1 class="app-title">Reset Password</h1>
    </div>

    <div class="right-side">
      <div class="login-card">
        <h2 class="login-title">Reset Your Password</h2>
        <p id="recoveryMessage">Checking reset link...</p>
        <form id="resetPasswordForm" style="display: none;" autocomplete="off">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" placeholder="Enter your new password" autocomplete="new-password" />

          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm new password" autocomplete="new-password" />

          <p id="resetError" class="error-message"></p>
          <button type="submit" class="login-btn">Reset Password</button>
          <button type="button" id="backToLoginBtn" class="cancel-btn">Back to Login</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './assets/supabaseClient.js';

    const recoveryMessage = document.getElementById('recoveryMessage');
    const resetForm = document.getElementById('resetPasswordForm');
    const newPasswordInput = document.getElementById('newPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const resetError = document.getElementById('resetError');
    const backToLoginBtn = document.getElementById('backToLoginBtn');

    function showError(message) {
      recoveryMessage.textContent = message;
      resetForm.style.display = 'none';
    }

    async function initRecovery() {
      try {
        // Get the current session - Supabase automatically handles recovery tokens in the URL
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();

        if (sessionError) {
          console.error('Session error:', sessionError);
          showError('Unable to validate reset link. Please request a new password reset.');
          return;
        }

        if (!session) {
          showError('The reset link is invalid or expired. Please request a new password reset from the login page.');
          return;
        }

        // Check if this is a recovery session
        const { data: { user }, error: userError } = await supabase.auth.getUser();
        if (userError || !user) {
          showError('Unable to verify your identity. Please request a new password reset.');
          return;
        }

        recoveryMessage.textContent = 'Enter a new password to complete the reset.';
        resetForm.style.display = 'block';
      } catch (error) {
        console.error('Recovery init error:', error);
        showError('An error occurred. Please try requesting a password reset again.');
      }
    }

    resetForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      resetError.textContent = '';

      const password = newPasswordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      if (!password || !confirmPassword) {
        resetError.textContent = 'Please enter and confirm your new password.';
        return;
      }

      if (password !== confirmPassword) {
        resetError.textContent = 'Passwords do not match. Please try again.';
        return;
      }

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        resetError.textContent = 'Unable to update password. Please try again.';
        console.error('Password update error:', error);
        return;
      }

      recoveryMessage.textContent = 'Your password has been updated successfully. You can now log in with your new password.';
      resetForm.style.display = 'none';
    });

    backToLoginBtn.addEventListener('click', () => {
      window.location.href = 'login_page.html';
    });

    initRecovery();
  </script>
</body>
</html>
